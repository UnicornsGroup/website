<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Results | Online Exam System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/custom.css" />
  </head>
  <body class="min-h-screen bg-slate-50">
    <div class="min-h-screen">
      <header class="border-b border-slate-200 bg-white px-4 py-4 shadow-sm sm:px-6">
        <div class="mx-auto flex max-w-6xl items-center justify-between gap-4">
          <div class="flex items-center gap-3">
            <img id="pageLogo" class="logo-image" src="../assets/logo/logo.png" alt="Coaching Logo" onerror="this.style.display='none'" />
            <div>
              <h1 class="text-xl font-semibold">Exam Results</h1>
              <p class="text-sm text-slate-500">Review scores and leaderboard for published exams.</p>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <a href="admin-dashboard.html" class="rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">Back</a>
            <button id="logoutBtn" class="rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">Logout</button>
          </div>
        </div>
      </header>
      <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6">
        <div class="overflow-hidden rounded-3xl bg-white p-6 card-shadow">
          <h2 class="text-lg font-semibold">Leaderboard</h2>
          <div id="resultsTable" class="mt-6"></div>
        </div>
      </main>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
  </body>
</html>
