<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard | Online Exam System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/custom.css" />
  </head>
  <body class="min-h-screen bg-slate-50">
    <div class="min-h-screen">
      <header class="border-b border-slate-200 bg-white px-4 py-4 shadow-sm sm:px-6">
        <div class="mx-auto flex max-w-6xl items-center justify-between gap-4">
          <div class="flex items-center gap-3">
            <img id="pageLogo" class="logo-image" src="assets/logo/logo.png" alt="Coaching Logo" onerror="this.style.display='none'" />
            <div>
              <h1 class="text-xl font-semibold">Student Dashboard</h1>
              <p class="text-sm text-slate-500">Personalized exams for your standard.</p>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <button id="logoutBtn" class="rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">Logout</button>
          </div>
        </div>
      </header>

      <main class="mx-auto max-w-6xl space-y-8 px-4 py-8 sm:px-6">
        <section class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
          <div class="rounded-3xl bg-white p-6 card-shadow">
            <p class="text-sm uppercase tracking-[0.3em] text-slate-400">Standard</p>
            <p id="studentStandard" class="mt-4 text-3xl font-semibold text-slate-900"></p>
          </div>
          <div class="rounded-3xl bg-white p-6 card-shadow">
            <p class="text-sm uppercase tracking-[0.3em] text-slate-400">Active Exams</p>
            <p id="activeCount" class="mt-4 text-3xl font-semibold text-emerald-600">0</p>
          </div>
          <div class="rounded-3xl bg-white p-6 card-shadow">
            <p class="text-sm uppercase tracking-[0.3em] text-slate-400">Upcoming</p>
            <p id="upcomingCount" class="mt-4 text-3xl font-semibold text-blue-600">0</p>
          </div>
          <div class="rounded-3xl bg-white p-6 card-shadow">
            <p class="text-sm uppercase tracking-[0.3em] text-slate-400">Completed</p>
            <p id="completedCount" class="mt-4 text-3xl font-semibold text-slate-900">0</p>
          </div>
        </section>

        <section class="grid gap-6 xl:grid-cols-3">
          <div class="rounded-3xl bg-white p-6 card-shadow">
            <h2 class="text-lg font-semibold">Active Exams</h2>
            <div id="activeExams" class="mt-6 space-y-4"></div>
          </div>
          <div class="rounded-3xl bg-white p-6 card-shadow">
            <h2 class="text-lg font-semibold">Upcoming Exams</h2>
            <div id="upcomingExams" class="mt-6 space-y-4"></div>
          </div>
          <div class="rounded-3xl bg-white p-6 card-shadow">
            <h2 class="text-lg font-semibold">Results & History</h2>
            <div id="completedExams" class="mt-6 space-y-4"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
