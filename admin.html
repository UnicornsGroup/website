<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Suraj English Academy Admin</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

</head>

<body class="bg-gray-100">

<!-- LOGIN PAGE -->

<div id="loginPage" class="flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow w-80">

<h2 class="text-xl font-bold mb-6 text-center">
Admin Login
</h2>

<input id="email" placeholder="Email"
class="border p-3 w-full mb-4 rounded">

<input id="password" type="password"
placeholder="Password"
class="border p-3 w-full mb-4 rounded">

<button onclick="login()"
class="bg-blue-600 text-white w-full py-3 rounded">
Login
</button>

<p id="loginError" class="text-red-500 mt-3 text-sm"></p>

</div>

</div>



<!-- ADMIN APP -->

<div id="app" class="hidden flex">

<!-- SIDEBAR -->

<div class="bg-blue-900 text-white w-60 min-h-screen p-5">

<h2 class="text-xl font-bold mb-6">
Academy Admin
</h2>

<div class="flex flex-col gap-3">

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('students')">Students</button>
<button onclick="showPage('fees')">Fees</button>
<button onclick="showPage('results')">Results</button>
<button onclick="logout()">Logout</button>

</div>

</div>



<!-- MAIN CONTENT -->

<div class="flex-1 p-6">


<!-- DASHBOARD -->

<div id="dashboardPage">

<h1 class="text-2xl font-bold mb-6">Dashboard</h1>

<div class="grid md:grid-cols-3 gap-6">

<div class="bg-white p-6 rounded shadow">
<p>Total Students</p>
<p id="dashStudents" class="text-2xl font-bold">0</p>
</div>

<div class="bg-white p-6 rounded shadow">
<p>Total Fees Collected</p>
<p id="dashFees" class="text-2xl font-bold">0</p>
</div>

<div class="bg-white p-6 rounded shadow">
<p>Total Results</p>
<p id="dashResults" class="text-2xl font-bold">0</p>
</div>

</div>

</div>



<!-- STUDENTS PAGE -->
<div id="studentsPage" class="hidden">

<!-- PASTE YOUR FULL STUDENT PAGE CODE HERE
EXCEPT <html>, <head>, <body> -->

</div>



<!-- FEES PAGE -->
<div id="feesPage" class="hidden">

<!-- PASTE YOUR FULL FEES PAGE CODE HERE
EXCEPT <html>, <head>, <body> -->

</div>



<!-- RESULT PAGE -->
<div id="resultsPage" class="hidden">

<!-- PASTE YOUR FULL RESULT PAGE CODE HERE
EXCEPT <html>, <head>, <body> -->

</div>


</div>
</div>



<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyACOURK_ZQEuxuZqP5Xfv_lZ29Nj59uHj8",
authDomain: "suraj-english-academy-7141e.firebaseapp.com",
projectId: "suraj-english-academy-7141e",
storageBucket: "suraj-english-academy-7141e.firebasestorage.app",
messagingSenderId: "291322319555",
appId: "1:291322319555:web:9ad5bb47e56ee27b9dc876"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);



/* LOGIN */

window.login = async function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{

await signInWithEmailAndPassword(auth,email,password);

}catch(e){

document.getElementById("loginError").innerText=e.message;

}

};



/* AUTH STATE */

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="flex";

loadDashboard();

}

});



/* LOGOUT */

window.logout=function(){

signOut(auth);

};



/* PAGE NAVIGATION */

window.showPage=function(page){

["dashboard","students","fees","results"].forEach(p=>{
document.getElementById(p+"Page").style.display="none";
});

document.getElementById(page+"Page").style.display="block";

};



/* DASHBOARD DATA */

async function loadDashboard(){

const students=await getDocs(collection(db,"students"));
const fees=await getDocs(collection(db,"fees"));
const results=await getDocs(collection(db,"results"));

let totalFees=0;

fees.forEach(doc=>{
totalFees+=Number(doc.data().amount||0);
});

document.getElementById("dashStudents").innerText=students.size;
document.getElementById("dashFees").innerText="₹ "+totalFees;
document.getElementById("dashResults").innerText=results.size;

}

</script>

</body>
</html>
