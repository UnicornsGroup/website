<!doctype html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel | Suraj English Academy</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- LOGIN SCREEN -->

<div id="loginScreen" class="min-h-screen flex items-center justify-center p-6">

<div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-sm">

<h2 class="text-2xl font-bold text-center mb-6 text-green-700">
Admin Login
</h2>

<input
type="password"
id="adminPassword"
placeholder="Enter Admin Password"
class="border p-3 rounded-lg w-full mb-4"
/>

<button
onclick="checkLogin()"
class="bg-green-600 text-white w-full py-3 rounded-lg">
Login
</button>

</div>

</div>


<!-- ADMIN DASHBOARD -->

<div id="adminPanel" class="hidden p-6">

<h1 class="text-3xl font-bold text-green-700 mb-6">
Suraj English Academy – Admissions
</h1>


<!-- DASHBOARD -->

<div class="grid md:grid-cols-4 gap-4 mb-6">

<div class="bg-white p-4 rounded-xl shadow text-center">
<p class="text-gray-500 text-sm">Total Students</p>
<p id="totalStudents" class="text-2xl font-bold text-green-700">0</p>
</div>

<div class="bg-white p-4 rounded-xl shadow text-center">
<p class="text-gray-500 text-sm">Std 8</p>
<p id="std8Count" class="text-2xl font-bold">0</p>
</div>

<div class="bg-white p-4 rounded-xl shadow text-center">
<p class="text-gray-500 text-sm">Std 9</p>
<p id="std9Count" class="text-2xl font-bold">0</p>
</div>

<div class="bg-white p-4 rounded-xl shadow text-center">
<p class="text-gray-500 text-sm">Std 10</p>
<p id="std10Count" class="text-2xl font-bold">0</p>
</div>

</div>


<!-- CONTROLS -->

<div class="flex flex-col md:flex-row gap-4 mb-6">

<input
id="searchInput"
placeholder="Search student..."
class="border p-3 rounded-lg w-full md:w-1/3"
/>

<select id="courseFilter" class="border p-3 rounded-lg w-full md:w-1/4">

<option value="">All Courses</option>
<option value="Std. 8">Std 8</option>
<option value="Std. 9">Std 9</option>
<option value="Std. 10">Std 10</option>

</select>

<button
onclick="downloadExcel()"
class="bg-blue-600 text-white px-4 py-3 rounded-lg">
Download Excel
</button>

</div>


<!-- TABLE -->

<div class="overflow-x-auto bg-white rounded-xl shadow">

<table class="min-w-full">

<thead class="bg-green-600 text-white">

<tr>
<th class="p-3 text-left">Admission No</th>
<th class="p-3 text-left">Name</th>
<th class="p-3 text-left">Course</th>
<th class="p-3 text-left">Mobile</th>
<th class="p-3 text-left">School</th>
<th class="p-3 text-left">Action</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyACOURK_ZQEuxuZqP5Xfv_lZ29Nj59uHj8",
authDomain: "suraj-english-academy-7141e.firebaseapp.com",
projectId: "suraj-english-academy-7141e",
storageBucket: "suraj-english-academy-7141e.firebasestorage.app",
messagingSenderId: "291322319555",
appId: "1:291322319555:web:9ad5bb47e56ee27b9dc876"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allData=[];

const tableBody=document.getElementById("tableBody");


async function loadAdmissions(){

const snapshot=await getDocs(collection(db,"admissions"));

allData=[];

snapshot.forEach(docSnap=>{
const data=docSnap.data();
data.id=docSnap.id;
allData.push(data);
});

renderTable(allData);
updateDashboard();

}


function renderTable(data){

tableBody.innerHTML="";

data.forEach(student=>{

const row=document.createElement("tr");

row.classList.add("border-b");

row.innerHTML=`

<td class="p-3">${student.admissionNo}</td>
<td class="p-3">${student.surname} ${student.name}</td>
<td class="p-3">${student.course}</td>
<td class="p-3">${student.mobile}</td>
<td class="p-3">${student.school}</td>

<td class="p-3">
<button class="bg-red-500 text-white px-3 py-1 rounded"
onclick="deleteStudent('${student.id}')">
Delete
</button>
</td>

`;

tableBody.appendChild(row);

});

}


function updateDashboard(){

document.getElementById("totalStudents").innerText=allData.length;

document.getElementById("std8Count").innerText=
allData.filter(s=>s.course.includes("Std. 8")).length;

document.getElementById("std9Count").innerText=
allData.filter(s=>s.course.includes("Std. 9")).length;

document.getElementById("std10Count").innerText=
allData.filter(s=>s.course.includes("Std. 10")).length;

}


window.deleteStudent=async function(id){

if(confirm("Delete this admission?")){

await deleteDoc(doc(db,"admissions",id));
loadAdmissions();

}

};


document.getElementById("searchInput").addEventListener("keyup",filterData);

document.getElementById("courseFilter").addEventListener("change",filterData);


function filterData(){

const search=document.getElementById("searchInput").value.toLowerCase();
const course=document.getElementById("courseFilter").value;

let filtered=allData.filter(s=>{

const matchSearch=
(s.name+s.surname+s.mobile).toLowerCase().includes(search);

const matchCourse=course=="" || s.course.includes(course);

return matchSearch && matchCourse;

});

renderTable(filtered);

}


window.downloadExcel=function(){

let csv="Admission No,Name,Course,Mobile,School\n";

allData.forEach(s=>{
csv+=`${s.admissionNo},"${s.surname} ${s.name}",${s.course},${s.mobile},${s.school}\n`;
});

const blob=new Blob([csv],{type:"text/csv"});
const url=URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download="admissions.csv";
a.click();

};

loadAdmissions();

</script>


<script>

function checkLogin(){

const password=document.getElementById("adminPassword").value;

if(password==="SEA2026ADMIN"){

document.getElementById("loginScreen").style.display="none";
document.getElementById("adminPanel").classList.remove("hidden");

}

else{

alert("Wrong password");

}

}

</script>

</body>
</html>
