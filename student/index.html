<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Login | Suraj English Academy</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-blue-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow w-full max-w-md">

<h2 class="text-2xl font-bold text-center mb-6">
Student Portal Login
</h2>

<input
id="mobile"
type="number"
placeholder="Registered Mobile Number"
class="border p-3 rounded w-full mb-4">

<input
id="password"
type="password"
placeholder="Password"
class="border p-3 rounded w-full mb-4">

<button
onclick="loginStudent()"
class="bg-blue-600 text-white w-full py-3 rounded">

Login

</button>

<p id="error" class="text-red-600 mt-3 text-center"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyACOURK_ZQEuxuZqP5Xfv_lZ29Nj59uHj8",
authDomain: "suraj-english-academy-7141e.firebaseapp.com",
projectId: "suraj-english-academy-7141e",
storageBucket: "suraj-english-academy-7141e.firebasestorage.app",
messagingSenderId: "291322319555",
appId: "1:291322319555:web:9ad5bb47e56ee27b9dc876"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.loginStudent=function(){

const mobile=document.getElementById("mobile").value;
const password=document.getElementById("password").value;

if(!mobile || !password){

document.getElementById("error").innerText="Enter Mobile and Password";
return;

}

const email=mobile+"@student.suraj";

signInWithEmailAndPassword(auth,email,password)

.then(()=>{

window.location="dashboard.html";

})

.catch(()=>{

document.getElementById("error").innerText="Invalid Mobile or Password";

});

};

</script>

</body>
</html>
