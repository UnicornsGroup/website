<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Results | Suraj English Academy</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<script>
tailwind.config = {
theme:{
extend:{
fontFamily:{
poppins:['Poppins'],
inter:['Inter']
},
colors:{
primary:{
500:'#8CC63F',
600:'#4CAF50'
},
accent:{
500:'#F7931E'
}
}
}
}
}
</script>

</head>


<body class="bg-gray-50 font-inter">

<!-- NAVBAR -->

<nav class="bg-white shadow-md sticky top-0 z-50">

<div class="max-w-6xl mx-auto px-4">

<div class="flex justify-between items-center h-16">

<div class="flex items-center space-x-3">

<img src="images/logo.png" class="w-10">

<div>
<h1 class="font-poppins font-bold text-primary-600">
Suraj English Academy
</h1>
<p class="text-xs text-gray-500">
Palanpur
</p>
</div>

</div>

<a href="index.html" class="text-gray-600 hover:text-primary-600 font-medium">
Home
</a>

</div>
</div>
</nav>



<!-- HEADER -->

<section class="bg-gradient-to-r from-primary-600 to-primary-500 text-white text-center py-14">

<h1 class="text-4xl font-poppins font-bold mb-2">
Student Results
</h1>

<p class="text-white/90">
Check exam results
</p>

</section>



<div class="max-w-5xl mx-auto px-4 py-10">


<!-- SELECT STANDARD -->

<div class="bg-white rounded-2xl shadow-lg p-6 mb-6">

<label class="font-semibold text-gray-700">
Select Standard
</label>

<select
id="stdSelect"
class="w-full border p-3 rounded-lg mt-2"
onchange="loadExamDates()">

<option value="">Select Standard</option>

<option value="Std. 8 (English Medium)">Std. 8 (English Medium)</option>
<option value="Std. 8 (Gujarati Medium)">Std. 8 (Gujarati Medium)</option>
<option value="Std. 9 (Gujarati Medium)">Std. 9 (Gujarati Medium)</option>
<option value="Std. 10 (Gujarati Medium)">Std. 10 (Gujarati Medium)</option>

</select>

</div>



<!-- SELECT DATE -->

<div class="bg-white rounded-2xl shadow-lg p-6 mb-8">

<label class="font-semibold text-gray-700">
Select Exam Date
</label>

<select
id="dateSelect"
class="w-full border p-3 rounded-lg mt-2"
onchange="loadResults()">

<option value="">Select Exam Date</option>

</select>

</div>



<!-- RESULT CARD -->

<div class="bg-white rounded-2xl shadow-lg p-6">

<h2 id="examTitle" class="text-2xl font-poppins font-bold text-center"></h2>

<p class="text-center text-gray-600 mb-6">
Exam Date: <span id="examDate"></span>
</p>


<div class="overflow-x-auto">

<table class="w-full border">

<thead class="bg-gray-100">

<tr>

<th class="p-3">Sr No</th>
<th class="p-3 text-left">Name</th>
<th class="p-3">Marks</th>

</tr>

</thead>

<tbody id="resultTable"></tbody>

</table>

</div>

</div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyACOURK_ZQEuxuZqP5Xfv_lZ29Nj59uHj8",
authDomain: "suraj-english-academy-7141e.firebaseapp.com",
projectId: "suraj-english-academy-7141e",
storageBucket: "suraj-english-academy-7141e.appspot.com",
messagingSenderId: "291322319555",
appId: "1:291322319555:web:9ad5bb47e56ee27b9dc876"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);



/* FETCH EXAM DATES */

window.loadExamDates = async function(){

const std = document.getElementById("stdSelect").value;

const q = query(
collection(db,"results"),
where("standard","==",std)
);

const snapshot = await getDocs(q);

let dates=[];

snapshot.forEach(doc=>{
dates.push(doc.data().examDate);
});

/* UNIQUE DATES */

dates=[...new Set(dates)];


/* SORT DD/MM/YYYY LATEST → OLDEST */

dates.sort((a,b)=>{

let d1=a.split("/").reverse().join("");
let d2=b.split("/").reverse().join("");

return d2-d1;

});


const dropdown=document.getElementById("dateSelect");

dropdown.innerHTML=`<option value="">Select Exam Date</option>`;

dates.forEach(date=>{

dropdown.innerHTML+=`
<option value="${date}">
${date}
</option>
`;

});

};



/* LOAD RESULTS */

window.loadResults = async function(){

const std=document.getElementById("stdSelect").value;
const date=document.getElementById("dateSelect").value;

const q=query(
collection(db,"results"),
where("standard","==",std)
);

const snapshot=await getDocs(q);

let results=[];

snapshot.forEach(doc=>{

const r=doc.data();

if(r.examDate===date){
results.push(r);
}

});

if(results.length===0){

document.getElementById("resultTable").innerHTML=
`<tr><td colspan="3" class="p-4 text-center">No results</td></tr>`;

return;

}


/* SORT HIGH → LOW */

results.sort((a,b)=>b.marks-a.marks);


/* SET TITLE */

document.getElementById("examTitle").innerText =
results[0].examName;

document.getElementById("examDate").innerText =
date;


/* TOP 3 UNIQUE MARKS */

let uniqueMarks=[...new Set(results.map(r=>r.marks))];

uniqueMarks.sort((a,b)=>b-a);

let top3=uniqueMarks.slice(0,3);


/* CREATE TABLE */

const table=document.getElementById("resultTable");

table.innerHTML="";

let sr=1;

results.forEach(r=>{

let highlight = top3.includes(r.marks);

table.innerHTML+=`

<tr class="${highlight ? 'bg-yellow-100 font-semibold' : ''}">

<td class="p-3 text-center">${sr}</td>

<td class="p-3">${r.name}</td>

<td class="p-3 text-center font-bold">${r.marks}</td>

</tr>

`;

sr++;

});

};

</script>


</body>
</html>
