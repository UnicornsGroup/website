<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Result Admin Panel</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body class="bg-gray-100 p-4 md:p-10">

<div id="navbar"></div>

<div class="max-w-6xl mx-auto bg-white p-6 rounded-2xl shadow">

<h1 class="text-xl md:text-2xl font-bold mb-6">
Result Panel
</h1>

<!-- EXAM DETAILS -->

<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">

<select id="stdSelect" class="border p-3 rounded w-full">
<option value="">Select Standard</option>
<option value="Std. 8 (English Medium)">Std. 8 (English Medium)</option>
<option value="Std. 8 (Gujarati Medium)">Std. 8 (Gujarati Medium)</option>
<option value="Std. 9 (Gujarati Medium)">Std. 9 (Gujarati Medium)</option>
<option value="Std. 10 (Gujarati Medium)">Std. 10 (Gujarati Medium)</option>
</select>

<input id="examName" placeholder="Exam Name"
class="border p-3 rounded w-full">

<input type="date" id="examDate"
class="border p-3 rounded w-full">

</div>

<button onclick="loadStudents()"
class="bg-green-600 text-white px-6 py-2 rounded mb-6 w-full md:w-auto">
Load Students </button>

<!-- STUDENT TABLE -->

<div class="overflow-x-auto">

<table class="w-full border bg-white text-sm md:text-base">

<thead class="bg-gray-200">

<tr>
<th class="p-3 border">Admission No</th>
<th class="p-3 border">Name</th>
<th class="p-3 border">Marks</th>
</tr>

</thead>

<tbody id="studentTable"></tbody>

</table>

</div>

<div class="flex flex-col md:flex-row gap-4 mt-6">

<button onclick="saveResults()"
class="bg-blue-600 text-white px-6 py-3 rounded w-full md:w-auto">
Save All Results </button>

<button onclick="downloadResultPDF()"
class="bg-purple-600 text-white px-6 py-3 rounded w-full md:w-auto">
Download Result PDF </button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
query,
where,
orderBy,
doc,
writeBatch
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyACOURK_ZQEuxuZqP5Xfv_lZ29Nj59uHj8",
authDomain: "suraj-english-academy-7141e.firebaseapp.com",
projectId: "suraj-english-academy-7141e",
storageBucket: "suraj-english-academy-7141e.firebasestorage.app",
messagingSenderId: "291322319555",
appId: "1:291322319555:web:9ad5bb47e56ee27b9dc876"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN CHECK */

onAuthStateChanged(auth,(user)=>{
if(!user){
window.location="login.html";
}
});

let students=[];

/* LOAD STUDENTS + PREVIOUS MARKS */

window.loadStudents = async function(){

const std=document.getElementById("stdSelect").value;
const examDate=document.getElementById("examDate").value;

if(!std){
alert("Select Standard");
return;
}

const studentQuery=query(
collection(db,"students"),
where("course","==",std)
);

const studentSnap=await getDocs(studentQuery);

const resultQuery=query(
collection(db,"results"),
where("standard","==",std),
where("examDate","==",examDate)
);

const resultSnap=await getDocs(resultQuery);

let resultMap={};

resultSnap.forEach(doc=>{
const r=doc.data();
resultMap[r.admissionNo]=r.marks;
});

const table=document.getElementById("studentTable");

table.innerHTML="";
students=[];

studentSnap.forEach(docSnap=>{

const data=docSnap.data();
students.push(data);

const marks=resultMap[data.admissionNo] || "";

const row=`
<tr>

<td class="border p-3">${data.admissionNo}</td>

<td class="border p-3">
${data.surname || ""} ${data.name || ""} ${data.lastname || ""}
</td>

<td class="border p-3">
<input type="number"
step="0.01"
value="${marks}"
class="border p-2 rounded w-24"
id="mark_${data.admissionNo}"
onkeydown="moveNext(event,this)">
</td>

</tr>
`;

table.innerHTML+=row;

});

};


/* ENTER KEY NAVIGATION */

window.moveNext=function(e,input){

if(e.key==="Enter"){

e.preventDefault();

const inputs=[...document.querySelectorAll("#studentTable input")];

const index=inputs.indexOf(input);

if(index+1<inputs.length){
inputs[index+1].focus();
}

}

};


/* BULK SAVE RESULTS */

window.saveResults = async function(){

const examName=document.getElementById("examName").value;
const examDate=document.getElementById("examDate").value;
const std=document.getElementById("stdSelect").value;

if(!examName || !examDate || !std){
alert("Enter exam details");
return;
}

const batch = writeBatch(db);

let saved=0;
let updated=0;

for(const s of students){

const markInput=document.getElementById("mark_"+s.admissionNo);
const marks=markInput.value;

if(marks==="") continue;

const q=query(
collection(db,"results"),
where("admissionNo","==",s.admissionNo),
where("standard","==",std),
where("examDate","==",examDate)
);

const snap=await getDocs(q);

if(!snap.empty){

const docId=snap.docs[0].id;

const ref = doc(db,"results",docId);

batch.update(ref,{
marks:Number(marks),
examName:examName,
updatedAt:new Date()
});

updated++;

}else{

const newRef = doc(collection(db,"results"));

batch.set(newRef,{
admissionNo:s.admissionNo,
name:(s.surname || "")+" "+(s.name || "")+" "+(s.lastname || ""),
standard:std,
marks:Number(marks),
examName:examName,
examDate:examDate,
createdAt:new Date()
});

saved++;

}

}

await batch.commit();

alert(saved+" new results saved, "+updated+" updated");

document.getElementById("studentTable").innerHTML="";
students=[];

};


/* DOWNLOAD PROFESSIONAL RESULT PDF */

window.downloadResultPDF = async function(){

const { jsPDF } = window.jspdf;

const std=document.getElementById("stdSelect").value;
const examDate=document.getElementById("examDate").value;
const examName=document.getElementById("examName").value;

if(!std || !examDate || !examName){
alert("Select Standard, Exam Name and Date");
return;
}

const q=query(
collection(db,"results"),
where("standard","==",std),
where("examDate","==",examDate),
orderBy("marks","desc")
);

const snapshot=await getDocs(q);

if(snapshot.empty){
alert("No results found");
return;
}

const pdf=new jsPDF();

let y=20;

try{
pdf.addImage("images/logo.png","PNG",90,5,30,20);
}catch(e){}

pdf.setFontSize(18);
pdf.text("Suraj English Academy",105,30,null,null,"center");

pdf.setFontSize(12);
pdf.text("Palanpur",105,37,null,null,"center");

pdf.setFontSize(14);
pdf.text("Result Sheet",105,45,null,null,"center");

pdf.setFontSize(11);

pdf.text("Standard: "+std,20,55);
pdf.text("Exam: "+examName,90,55);
pdf.text("Date: "+examDate,160,55);

y=70;

pdf.setFontSize(12);

pdf.text("Rank",20,y);
pdf.text("Admission No",40,y);
pdf.text("Student Name",90,y);
pdf.text("Marks",180,y);

y+=8;

let rank=1;

snapshot.forEach(docSnap=>{

const d=docSnap.data();

if(y>270){

pdf.addPage();

y=20;

pdf.setFontSize(14);
pdf.text("Result Sheet (Continued)",105,20,null,null,"center");

y=35;

pdf.text("Rank",20,y);
pdf.text("Admission No",40,y);
pdf.text("Student Name",90,y);
pdf.text("Marks",180,y);

y+=8;

}

pdf.setFontSize(11);

pdf.text(String(rank),20,y);
pdf.text(String(d.admissionNo),40,y);
pdf.text(String(d.name),90,y);
pdf.text(String(d.marks),180,y);

y+=8;
rank++;

});

y+=10;

pdf.setFontSize(10);

pdf.text(
"This is a computer generated result sheet. If you have any query whatsapp us.",
105,
y,
null,
null,
"center"
);

pdf.save(std+"_Result_"+examDate+".pdf");

};

</script>

<script>

fetch("navbar.html")
.then(res => res.text())
.then(data => {
document.getElementById("navbar").innerHTML = data;
});

</script>

<script>

fetch("navbar.html")
.then(res => res.text())
.then(data => {

document.getElementById("navbar").innerHTML = data;

/* highlight active page */

const links = document.querySelectorAll(".nav-link");

const currentPage = window.location.pathname.split("/").pop();

links.forEach(link => {

if(link.getAttribute("href") === currentPage){

link.style.background = "#1e40af";
link.style.padding = "6px 10px";
link.style.borderRadius = "6px";

}

});

});

/* mobile menu */

function toggleMenu(){

const menu=document.getElementById("mobileMenu");

if(menu){
menu.classList.toggle("hidden");
}

}

</script>
  
</body>
</html>
